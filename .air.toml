root = "."

[build]
  cmd = "go build -o ./backend/cmd/tmp/main ./backend/cmd"
  bin = "./backend/cmd/tmp/main"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor"]
  exclude_regex = ["_test.go"]
  log = "build-errors.log"
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[misc]
# Delete tmp directory on exit
clean_on_exit = true
